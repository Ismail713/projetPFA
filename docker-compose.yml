services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      ai-service:
        condition: service_started
    environment:
      PORT: 4000
      DATABASE_URL: postgresql://smartmatch:password@postgres:5432/smartmatch_db
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_prod}
      AI_SERVICE_URL: http://ai-service:8000
      NODE_ENV: development

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    environment:
      GEMMA_MODEL_URL: http://ollama:11434
      GEMMA_MODEL_NAME: gemma3
      PORT: 8000

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: smartmatch
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smartmatch_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartmatch -d smartmatch_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  ollama_data:
