services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - ai-service
    env_file: ./backend/.env

  ai-service:
    build: ./ai-service
    ports:
      - "8000:8000"
    env_file: ./ai-service/.env

  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: smartmatch
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smartmatch_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
